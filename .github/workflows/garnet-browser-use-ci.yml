name: Garnet Browser Use CI
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/garnet-browser-use-ci.yml'
permissions:
  contents: read
  pull-requests: write
jobs:
  browser-install:
    name: Chromium Install (Garnet)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Garnet Runtime Visibility
        uses: garnet-org/action@v2
        with:
          api_token: ${{ secrets.GARNET_API_TOKEN }}
          jibril_version: v2.14.0
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Restore Chromium cache
        id: chromium-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: garnet-browser-use-${{ runner.os }}-${{ runner.arch }}-chromium-refresh-v2
      - name: Install Chromium and system dependencies
        if: steps.chromium-cache.outputs.cache-hit != 'true'
        run: uvx playwright install chromium --with-deps --no-shell
      - name: Verify browser payload
        run: find ~/.cache/ms-playwright -maxdepth 2 -type f | head -20
