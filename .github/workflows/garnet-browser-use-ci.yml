name: Garnet Browser Use CI
on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  pull-requests: write
jobs:
  browser-install:
    name: Chromium Install (Garnet)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout Commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Garnet Runtime Visibility
        uses: garnet-org/action@v2
        with:
          api_token: ${{ secrets.GARNET_API_TOKEN }}
          jibril_version: v2.14.0
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install Chromium and system dependencies
        run: uvx playwright install chromium --with-deps --no-shell
      - name: Verify browser payload
        run: find ~/.cache/ms-playwright -maxdepth 2 -type f | head -20

      - name: Export Jibril profile
        if: always()
        run: |
          set -uo pipefail
          sudo systemctl stop jibril.service || true
          for i in $(seq 1 10); do
            if sudo test -f /var/log/jibril.profile.json; then break; fi
            sleep 1
          done
          mkdir -p "$RUNNER_TEMP/gcg"
          if sudo test -f /var/log/jibril.profile.json; then
            sudo cp /var/log/jibril.profile.json "$RUNNER_TEMP/gcg/profile.json"
            sudo chown "$(id -u):$(id -g)" "$RUNNER_TEMP/gcg/profile.json"
          fi
      - name: Render and upsert Garnet coverage-gap comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PROFILE_PATH: ${{ runner.temp }}/gcg/profile.json
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_LABEL: browser-use
          COVGAP_MARKER: garnet-covgap-browser-use
        run: |
          set -euo pipefail
          if ! command -v node >/dev/null 2>&1; then
            curl -fsSL https://nodejs.org/dist/v20.19.4/node-v20.19.4-linux-x64.tar.xz -o /tmp/node.tar.xz
            tar -C /tmp -xf /tmp/node.tar.xz
            export PATH="/tmp/node-v20.19.4-linux-x64/bin:$PATH"
          fi
          base_ref="${{ github.event.pull_request.base.ref }}"
          git fetch origin "$base_ref" >/dev/null 2>&1 || true
          export DIFF_NUMSTAT=$(git diff --numstat "origin/${base_ref}...${HEAD_SHA}" || true)
          git diff "origin/${base_ref}...${HEAD_SHA}" > "$RUNNER_TEMP/diff.patch" || true
          export DIFF_PATCH_PATH="$RUNNER_TEMP/diff.patch"
          node .github/scripts/coverage-gap.mjs > "$RUNNER_TEMP/covgap.md" 2>/dev/null || { echo "covgap render failed"; exit 0; }
          cat "$RUNNER_TEMP/covgap.md" >> "$GITHUB_STEP_SUMMARY"
          marker="garnet-covgap-browser-use"
          existing=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
            --jq "[.[] | select(.body | contains(\"${marker}\")) | .id] | first // empty")
          if [ -n "$existing" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" -X PATCH -F body=@"$RUNNER_TEMP/covgap.md" >/dev/null
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" -X POST -F body=@"$RUNNER_TEMP/covgap.md" >/dev/null
          fi
